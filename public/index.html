<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Bot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 400px;
        }
        h1 { margin-bottom: 20px; }
        .status {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .online { background: #00c853; color: black; }
        .offline { background: #d50000; }
        .connecting { background: #ffab00; color: black; }
        .qr-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        .qr-box img {
            max-width: 100%;
            width: 280px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 HMB BOT WHATSAPP </h1>
        <div id="status" class="status offline">⏳ En attente...</div>
        <div id="qr-box" class="qr-box hidden">
            <h3>📱 Scannez ce QR Code</h3>
            <p>WhatsApp → Paramètres → Appareils connectés</p>
            <img id="qr-img" alt="QR Code" />
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io({
            reconnection: true,
            reconnectionAttempts: Infinity
        });
        
        const statusDiv = document.getElementById('status');
        const qrBox = document.getElementById('qr-box');
        const qrImg = document.getElementById('qr-img');
        
        socket.on('connect', () => {
            console.log('Connecté au serveur');
            statusDiv.textContent = '⏳ Connexion...';
        });
        
        socket.on('qr', (qrData) => {
            console.log('QR reçu');
            statusDiv.className = 'status connecting';
            statusDiv.textContent = '📱 QR Code prêt - SCANNEZ !';
            qrBox.classList.remove('hidden');
            qrImg.src = qrData;
        });
        
        socket.on('connected', () => {
            statusDiv.className = 'status online';
            statusDiv.textContent = '✅ Connecté !';
            qrBox.classList.add('hidden');
        });
        
        socket.on('disconnect', () => {
            statusDiv.className = 'status offline';
            statusDiv.textContent = '❌ Déconnecté';
        });
    </script>
</body>
</html>
